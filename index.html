<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>焦作市教育局中招成绩查询</title>
  <style>
    /* 基础样式重置 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      line-height: 1.6;
      background-color: #f8f9fa;
      color: #333;
      min-height: 100vh;
    }

    /* 头部样式 */
    .page-header {
      background-color: #2c7a5a;
      color: white;
      padding: 1.2rem 2rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .page-header h1 {
      font-size: 1.8rem;
      font-weight: 500;
    }

    /* 主体内容容器 */
    .main-container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    /* 双栏布局 */
    .content-wrapper {
      display: flex;
      gap: 2rem;
      flex-direction: column;
    }

    @media (min-width: 768px) {
      .content-wrapper {
        flex-direction: row;
      }
    }

    /* 表单区域 */
    .query-form {
      flex: 1;
      background: white;
      border-radius: 8px;
      padding: 1.5rem;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
    }

    .form-title {
      font-size: 1.3rem;
      color: #2c7a5a;
      margin-bottom: 1.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid #eee;
    }

    /* 表单元素 */
    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-label {
      display: block;
      margin-bottom: 0.6rem;
      color: #555;
      font-weight: 500;
    }

    .form-control {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
      transition: border-color 0.3s ease;
    }

    .form-control:focus {
      outline: none;
      border-color: #2c7a5a;
      box-shadow: 0 0 0 3px rgba(44, 122, 90, 0.1);
    }

    /* 查询按钮 */
    .submit-btn {
      width: 100%;
      padding: 0.9rem;
      background-color: #2c7a5a;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .submit-btn:hover {
      background-color: #235f47;
    }

    /* 结果区域 */
    .result-panel {
      flex: 2;
      background: white;
      border-radius: 8px;
      padding: 1.5rem;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
    }

    .result-content {
      background: #f8faf9;
      border: 1px solid #e9ecef;
      border-radius: 6px;
      padding: 1.5rem;
      min-height: 200px;
    }

    /* 成绩网格布局 */
    .score-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
    }

    .score-item {
      padding: 0.5rem 0;
      border-bottom: 1px solid #eee;
    }

    /* 错误提示 */
    .error-message {
      color: #dc2626;
      padding: 1rem;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
    }

    /* 学生信息标题 */
    .student-info-title {
      font-size: 1.1rem;
      color: #2c7a5a;
      margin-bottom: 1rem;
      font-weight: 600;
    }

    /* 指定数据特殊样式 */
    .score-value-red {
      color: #dc2626;
      font-weight: bold;
    }

    .score-value-large {
      color: #dc2626;
      font-weight: bold;
      font-size: 1.3rem;
    }
  </style>
</head>

<body>
  <header class="page-header">
    <h1>焦作市教育局中招成绩查询系统</h1>
  </header>

  <main class="main-container">
    <div class="content-wrapper">
      <!-- 查询表单 -->
      <section class="query-form">
        <h2 class="form-title">查询信息</h2>
        <div class="form-group">
          <label class="form-label" for="grade">年级：</label>
          <select class="form-control" id="grade">
            <option value="3">初三</option>
            <option value="2">初二</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="studentId">准考证号：</label>
          <input type="text" class="form-control" name="id" id="studentId" placeholder="请输入准考证号">
        </div>
        <div class="form-group">
          <label class="form-label" for="studentName">姓名：</label>
          <input type="text" class="form-control" name="name" id="studentName" placeholder="请输入姓名">
        </div>
        <button class="submit-btn" onclick="queryResult()">立即查询</button>
      </section>

      <!-- 结果展示 -->
      <section class="result-panel">
        <h2 class="form-title">查询结果</h2>
        <div class="result-content" id="resultBox">
          请先选择年级，输入对应信息后点击查询。
        </div>
        <div class="verification-section" id="verificationCodeBox"></div>
      </section>
    </div>
  </main>

  <script>
    // ============================================================
    // 指定准考证号 → 指定测试数据
    // ============================================================
    var specificStudents = {
      // 示例：指定准考证号对应指定学生成绩
      "250882161208": {
        "3": { // 初三
          headers: ["准考证号", "姓名", "语文", "数学", "英语", "物理", "化学", "道德与法治", "历史", "体育", "实验操作", "处理结果"],
          student: {
            "准考证号": "250882161208",
            "姓名": "李楷周",
            "语文": "作弊",
            "数学": "交白卷",
            "英语": "缺考",
            "物理": "骚扰监考老师",
            "化学": "考试崩屁",
            "道德与法治": "道德败坏",
            "历史": "日本人",
            "体育": "下肢残疾",
            "实验操作": "上肢残废",
            "处理结果": "立刻枪毙！！！"
          }
        },
        "2": { // 初二
          headers: ["准考证号", "姓名", "生物", "地理", "祝福"],
          student: {
            "准考证号": "250882161208",
            "姓名": "李楷周",
            "生物": "给监考老师配了",
            "地理": "给藏马熊配了",
            "祝福": "早生贵子♥️"
          }
        }
      },
      "250882160410": {
        "3": { // 初三
          headers: ["准考证号", "姓名", "语文", "数学", "英语", "物理", "化学", "道德与法治", "历史", "体育", "实验操作", "总分"],
          student: {
            "准考证号": "250882160410",
            "姓名": "郝欣妍",
            "语文": "120",
            "数学": "120",
            "英语": "120",
            "物理": "70",
            "化学": "50",
            "道德与法治": "70",
            "历史": "50",
            "体育": "100",
            "实验操作": "30",
            "总分": "730"
          }
        },
        "2": { // 初二
          headers: ["准考证号", "姓名", "我想对你说", "给你打分",],
          student: {
            "准考证号": "250882160410",
            "姓名": "郝欣妍",
            "我想对你说": "我喜欢你",
            "给你打分": "100/100"
          }
        }
      },
      "250882000002": {
        "3": {
          headers: ["准考证号", "姓名", "语文", "数学", "英语", "物理", "化学", "道德与法治", "历史", "体育", "实验操作", "总分"],
          student: {
            "准考证号": "250882000002",
            "姓名": "李四",
            "语文": "95",
            "数学": "103",
            "英语": "98",
            "物理": "85",
            "化学": "70",
            "道德与法治": "80",
            "历史": "82",
            "体育": "65",
            "实验操作": "25",
            "总分": "703"
          }
        },
        "2": {
          headers: ["准考证号", "姓名", "生物", "地理", "总分"],
          student: {
            "准考证号": "250882000002",
            "姓名": "李四",
            "生物": "42",
            "地理": "40",
            "总分": "82"
          }
        }
      }
    };

    // ============================================================
    // 通用测试数据生成（12位 250882 开头的准考证号）
    // ============================================================
    function generateGenericData(id, grade, name) {
      // 根据准考证号后6位生成确定性分数，保证同一号码每次查询结果一致
      var seed = 0;
      for (var i = 0; i < id.length; i++) {
        seed = (seed * 31 + id.charCodeAt(i)) & 0x7fffffff;
      }

      function randScore(min, max) {
        seed = (seed * 1103515245 + 12345) & 0x7fffffff;
        var range = max - min;
        return min + (seed % (range + 1));
      }

      if (grade === "3") {
        var yu = randScore(90, 118);
        var shu = randScore(90, 119);
        var ying = randScore(85, 118);
        var wu = randScore(75, 98);
        var hua = randScore(60, 78);
        var dao = randScore(70, 96);
        var li = randScore(70, 96);
        var ti = randScore(55, 70);
        var shi = randScore(22, 30);
        var total = yu + shu + ying + wu + hua + dao + li + ti + shi;

        return {
          headers: ["准考证号", "姓名", "语文", "数学", "英语", "物理", "化学", "道德与法治", "历史", "体育", "实验操作", "总分"],
          student: {
            "准考证号": id,
            "姓名": name,
            "语文": String(yu),
            "数学": String(shu),
            "英语": String(ying),
            "物理": String(wu),
            "化学": String(hua),
            "道德与法治": String(dao),
            "历史": String(li),
            "体育": String(ti),
            "实验操作": String(shi),
            "总分": String(total)
          }
        };
      } else {
        var shengWu = randScore(38, 50);
        var diLi = randScore(38, 50);
        return {
          headers: ["准考证号", "姓名", "生物", "地理", "总分"],
          student: {
            "准考证号": id,
            "姓名": name,
            "生物": String(shengWu),
            "地理": String(diLi),
            "总分": String(shengWu + diLi)
          }
        };
      }
    }

    // ============================================================
    // 查询主函数
    // ============================================================
    function queryResult() {
      var grade = document.getElementById('grade').value;
      var id = document.getElementById('studentId').value.trim();
      var name = document.getElementById('studentName').value.trim();
      var resultBox = document.getElementById('resultBox');

      // 输入校验
      if (!id) {
        resultBox.innerHTML = '<div class="error-message">请输入准考证号</div>';
        return;
      }

      var data = null;

      // 1. 指定准考证号 → 指定测试数据
      if (specificStudents[id] && specificStudents[id][grade]) {
        data = specificStudents[id][grade];
      }
      // 2. 12位且以 250882 开头 → 通用测试数据
      else if (id.length === 12 && id.indexOf("250882") === 0) {
        data = generateGenericData(id, grade, name);
      }
      // 3. 不符合条件 → 错误提示
      else {
        resultBox.innerHTML = '<div class="error-message">未找到该准考证号对应的成绩信息，请检查输入是否正确。</div>';
        return;
      }

      // 渲染成绩
      var resultHTML = '<div class="student-info-title">成绩详情</div>';
      resultHTML += '<div class="score-grid">';

      // 指定数据特殊样式配置
      var specialId = "250882161208";
      var redValues = ["作弊", "交白卷", "缺考", "骚扰监考老师", "考试崩屁", "道德败坏", "日本人", "下肢残疾", "上肢残废", "给监考老师配了", "给藏马熊配了", "早生贵子♥️"];
      var largeValues = ["立刻枪毙！！！"];

      data.headers.forEach(function (header) {
        var value = data.student[header] !== undefined ? data.student[header] : '';
        var valueClass = '';

        // 仅对指定准考证号应用特殊样式
        if (id === specialId) {
          if (largeValues.indexOf(value) !== -1) {
            valueClass = 'score-value-large';
          } else if (redValues.indexOf(value) !== -1) {
            valueClass = 'score-value-red';
          }
        }

        var styleAttr = valueClass ? ' class="' + valueClass + '"' : '';
        resultHTML +=
          '<div class="score-item">' +
          '<strong>' + header + '：</strong>' +
          '<span' + styleAttr + '>' + value + '</span>' +
          '</div>';
      });
      resultHTML += '</div>';
      resultBox.innerHTML = resultHTML;
    }
  </script>

  <footer style="position: fixed; bottom: 0; width: 100%; text-align: center; padding: 10px; background: #f5f5f5; font-size: 12px;">
    推荐使用以下浏览器获得最佳体验：
    <span style="margin: 0 10px;">Chrome 80+</span>
    <span style="margin: 0 10px;">Firefox 75+</span>
    <span style="margin: 0 10px;">Edge 80+</span>
    <span style="margin: 0 10px;">Safari 13+</span>
  </footer>

</body>
</html>
