<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>焦作市教育局中招成绩查询</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      line-height: 1.6;
      background-color: #f8f9fa;
      color: #333;
      min-height: 100vh;
    }

    .page-header {
      background-color: #2c7a5a;
      color: white;
      padding: 1.2rem 2rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .page-header h1 {
      font-size: 1.8rem;
      font-weight: 500;
    }

    .main-container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .content-wrapper {
      display: flex;
      gap: 2rem;
      flex-direction: column;
    }

    @media (min-width: 768px) {
      .content-wrapper {
        flex-direction: row;
      }
    }

    .query-form {
      flex: 1;
      background: white;
      border-radius: 8px;
      padding: 1.5rem;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
    }

    .form-title {
      font-size: 1.3rem;
      color: #2c7a5a;
      margin-bottom: 1.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid #eee;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-label {
      display: block;
      margin-bottom: 0.6rem;
      color: #555;
      font-weight: 500;
    }

    .form-control {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
      transition: border-color 0.3s ease;
    }

    .form-control:focus {
      outline: none;
      border-color: #2c7a5a;
      box-shadow: 0 0 0 3px rgba(44, 122, 90, 0.1);
    }

    .submit-btn {
      width: 100%;
      padding: 0.9rem;
      background-color: #2c7a5a;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .submit-btn:hover {
      background-color: #235f47;
    }

    .result-panel {
      flex: 2;
      background: white;
      border-radius: 8px;
      padding: 1.5rem;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
    }

    .result-content {
      background: #f8faf9;
      border: 1px solid #e9ecef;
      border-radius: 6px;
      padding: 1.5rem;
      min-height: 200px;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
    }

    .score-item {
      padding: 0.5rem 0;
      border-bottom: 1px solid #eee;
    }

    .error-message {
      color: #dc2626;
      padding: 1rem;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
    }

    .student-info-title {
      font-size: 1.1rem;
      color: #2c7a5a;
      margin-bottom: 1rem;
      font-weight: 600;
    }

    .score-value-red {
      color: #dc2626;
      font-weight: bold;
    }

    .score-value-large {
      color: #dc2626;
      font-weight: bold;
      font-size: 1.3rem;
    }
  </style>
</head>

<body>
  <header class="page-header">
    <h1>焦作市教育局中招成绩查询系统</h1>
  </header>

  <main class="main-container">
    <div class="content-wrapper">
      <section class="query-form">
        <h2 class="form-title">查询信息</h2>
        <div class="form-group">
          <label class="form-label" for="grade">年级：</label>
          <select class="form-control" id="grade">
            <option value="3">初三</option>
            <option value="2">初二</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="studentId">准考证号：</label>
          <input type="text" class="form-control" id="studentId" placeholder="请输入准考证号">
        </div>
        <div class="form-group">
          <label class="form-label" for="studentName">姓名：</label>
          <input type="text" class="form-control" id="studentName" placeholder="请输入姓名">
        </div>
        <button class="submit-btn" onclick="queryResult()">立即查询</button>
      </section>

      <section class="result-panel">
        <h2 class="form-title">查询结果</h2>
        <div class="result-content" id="resultBox">
          请先选择年级，输入对应信息后点击查询。
        </div>
      </section>
    </div>
  </main>

  <script>

          student: {

            "英语": "120",
            "物理": "70",

            "道德与法治": "70",
            "历史": "50",

            "总分": "730"
          }
        },

          student: {

          }

      "250882169191": {
        "3": {
          headers: ["准考证号", "姓名", "语文", "数学", "英语", "物理", "化学", "道德与法治", "历史", "体育", "实验操作", "总分"],
          student: {

          student: {

          }

    };

    // ============================================================
    // 通用测试数据生成（12位 250882 开头的准考证号）
    // ============================================================
    function generateGenericData(id, grade, name) {
      var seed = 0;
      for (var i = 0; i < id.length; i++) {
        seed = (seed * 31 + id.charCodeAt(i)) & 0x7fffffff;
      }

      function randScore(min, max) {
        seed = (seed * 1103515245 + 12345) & 0x7fffffff;
        return min + (seed % (max - min + 1));
      }

      if (grade === "3") {
        var yu  = randScore(90, 118);
        var shu = randScore(90, 119);
        var ying = randScore(85, 118);
        var wu  = randScore(75, 98);
        var hua = randScore(60, 78);
        var dao = randScore(70, 96);
        var li  = randScore(70, 96);
        var ti  = randScore(55, 70);
        var shi = randScore(22, 30);
        var total = yu + shu + ying + wu + hua + dao + li + ti + shi;
        return {
          headers: ["准考证号", "姓名", "语文", "数学", "英语", "物理", "化学", "道德与法治", "历史", "体育", "实验操作", "总分"],
          student: {
            "准考证号": id,
            "姓名": name,
            "语文": String(yu),
            "数学": String(shu),
            "英语": String(ying),
            "物理": String(wu),
            "化学": String(hua),
            "道德与法治": String(dao),
            "历史": String(li),
            "体育": String(ti),
            "实验操作": String(shi),
            "总分": String(total)
          }
        };
      } else {
        var sw = randScore(38, 50);
        var dl = randScore(38, 50);
        return {
          headers: ["准考证号", "姓名", "生物", "地理", "总分"],
          student: {
            "准考证号": id,
            "姓名": name,
            "生物": String(sw),
            "地理": String(dl),
            "总分": String(sw + dl)
          }
        };
      }
    }

    // ============================================================
    // 查询主函数
    // ============================================================
    function queryResult() {
      var grade = document.getElementById('grade').value;
      var id    = document.getElementById('studentId').value.trim();
      var name  = document.getElementById('studentName').value.trim();
      var resultBox = document.getElementById('resultBox');

      if (!id) {
        resultBox.innerHTML = '<div class="error-message">请输入准考证号</div>';
        return;
      }

      var data = null;

      if (specificStudents[id] && specificStudents[id][grade]) {
        data = specificStudents[id][grade];
      } else if (id.length === 12 && id.indexOf("250882") === 0) {
        data = generateGenericData(id, grade, name);
      } else {
        resultBox.innerHTML = '<div class="error-message">未找到该准考证号对应的成绩信息，请检查输入是否正确。</div>';
        return;
      }

      // 所有需要特殊样式的数据配置
      var redValues  = [
        "作弊", "交白卷", "缺考", "骚扰监考老师", "考试崩屁",
        "道德败坏", "日本人", "下肢残疾", "上肢残废",
        "给监考老师配了", "给藏马熊配了",
        "白卷", "没扫上", "丢了", "吃了", "零素质", "日本入", "霍金",
        "崩撒卡拉卡", "拉卷子上了", "写的啥呀", "认字儿不",
        "苹果砸死你", "酒精灯炸死你", "略略略", "失火", "家里蹲",
        "10（只会算两位数的加减）"
      ];
      var largeValues = ["立刻枪毙！！！", "大零蛋"];

      var resultHTML = '<div class="student-info-title">成绩详情</div><div class="score-grid">';
      data.headers.forEach(function (header) {
        var value     = data.student[header] !== undefined ? data.student[header] : '';
        var valueClass = '';
        if (largeValues.indexOf(value) !== -1) {
          valueClass = 'score-value-large';
        } else if (redValues.indexOf(value) !== -1) {
          valueClass = 'score-value-red';
        }
        var styleAttr = valueClass ? ' class="' + valueClass + '"' : '';
        resultHTML +=
          '<div class="score-item">' +
            '<strong>' + header + '：</strong>' +
            '<span' + styleAttr + '>' + value + '</span>' +
          '</div>';
      });
      resultHTML += '</div>';
      resultBox.innerHTML = resultHTML;
    }
  </script>

</html>
